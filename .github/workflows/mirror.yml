name: 同步、构建并发布 Yohaku

on:
  workflow_dispatch:
  schedule:
    - cron: "7/5 * * * *"
  repository_dispatch:
    types: [trigger-workflow]

permissions:
  contents: write

concurrency:
  group: sync-build-yohaku-${{ github.ref }}
  cancel-in-progress: true

env:
  HASH_FILE: build_hash
  SOURCE_REPO: innei-dev/Yohaku
  TARGET_REPO: Akuma-real/Yohaku
  CNB_REPO: june-ink/yohaku
  CNB_REPO_URL: https://cnb.cool/june-ink/yohaku.git
  TARGET_BRANCH: main
  IMAGE_NAME: ghcr.io/akuma-real/yohaku
  CNB_IMAGE: docker.cnb.cool/june-ink/yohaku
  BASE_URL: https://june.ink

jobs:
  prepare:
    name: 准备
    runs-on: ubuntu-latest
    outputs:
      hash_content: ${{ steps.read_hash.outputs.hash_content }}

    steps:
      - name: 检出 SyncYohaku 仓库
        uses: actions/checkout@v5

      - name: 读取 HASH_FILE 内容
        id: read_hash
        run: |
          set -euo pipefail
          content=$(cat "${HASH_FILE}" 2>/dev/null || true)
          printf 'hash_content=%s\n' "$content" >> "$GITHUB_OUTPUT"

  check:
    name: 检查是否需要重新构建
    runs-on: ubuntu-latest
    needs: prepare
    outputs:
      canceled: ${{ steps.compare.outputs.canceled }}
      sha_short: ${{ steps.compare.outputs.sha_short }}
      sha_full: ${{ steps.compare.outputs.sha_full }}

    steps:
      - name: 检出源仓库
        uses: actions/checkout@v5
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ env.TARGET_BRANCH }}
          token: ${{ secrets.PAT }}
          fetch-depth: 1
          lfs: true

      - name: 检出 LFS 对象（如果存在）
        run: git lfs checkout || true

      - name: 比较源仓库哈希与已记录哈希
        id: compare
        env:
          FILE_HASH: ${{ needs.prepare.outputs.hash_content }}
        run: |
          set -euo pipefail
          sha_short=$(git rev-parse --short HEAD)
          sha_full=$(git rev-parse HEAD)

          printf 'sha_short=%s\n' "$sha_short" >> "$GITHUB_OUTPUT"
          printf 'sha_full=%s\n' "$sha_full" >> "$GITHUB_OUTPUT"

          echo "已记录哈希: ${FILE_HASH}"
          echo "当前哈希: ${sha_short}"

          if [ "${FILE_HASH}" = "${sha_full}" ] || [ "${FILE_HASH}" = "${sha_short}" ]; then
            echo "上游没有变化，跳过。"
            echo "canceled=true" >> "$GITHUB_OUTPUT"
          else
            echo "检测到上游变化，继续执行。"
            echo "canceled=false" >> "$GITHUB_OUTPUT"
          fi

  source_preflight:
    name: 预检上游可构建性
    runs-on: ubuntu-latest
    needs: check
    if: ${{ needs.check.outputs.canceled != 'true' }}
    outputs:
      source_buildable: ${{ steps.workspace.outputs.source_buildable }}
      needs_workspace_patch: ${{ steps.workspace.outputs.needs_workspace_patch }}
      reason: ${{ steps.workspace.outputs.reason }}

    steps:
      - name: 检出源仓库指定提交
        uses: actions/checkout@v5
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ needs.check.outputs.sha_full }}
          token: ${{ secrets.PAT }}
          fetch-depth: 1
          lfs: true
          submodules: recursive

      - name: 检出 LFS 对象（如果存在）
        run: git lfs checkout || true

      - name: 检查 workspace 依赖是否可见或可临时补齐
        id: workspace
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require("node:fs")
          const path = require("node:path")

          const targetPackage = "@yohaku/design-system"
          const workspaceFile = "pnpm-workspace.yaml"
          const outputFile = process.env.GITHUB_OUTPUT

          function normalizePath(value) {
            return value.replace(/\\/g, "/").replace(/^\.\/+/, "").replace(/\/+$/, "")
          }

          function escapeRegExp(value) {
            return value.replace(/[|\\{}()[\]^$+?.]/g, "\\$&")
          }

          function globToRegExp(glob) {
            const normalized = normalizePath(glob)
            let source = ""

            for (let index = 0; index < normalized.length; index += 1) {
              const char = normalized[index]
              const next = normalized[index + 1]

              if (char === "*" && next === "*") {
                source += ".*"
                index += 1
              } else if (char === "*") {
                source += "[^/]+"
              } else {
                source += escapeRegExp(char)
              }
            }

            return new RegExp(`^${source}$`)
          }

          function readWorkspacePatterns() {
            if (!fs.existsSync(workspaceFile)) {
              return []
            }

            const patterns = []
            const lines = fs.readFileSync(workspaceFile, "utf8").split(/\r?\n/)
            let inPackages = false

            for (const rawLine of lines) {
              const line = rawLine.trim()

              if (!line || line.startsWith("#")) {
                continue
              }

              if (/^packages\s*:/.test(line)) {
                inPackages = true
                continue
              }

              if (inPackages && /^[A-Za-z0-9_-]+\s*:/.test(line)) {
                break
              }

              if (!inPackages) {
                continue
              }

              const match = line.match(/^-\s*(.+)$/)
              if (!match) {
                continue
              }

              const pattern = match[1]
                .replace(/\s+#.*$/, "")
                .trim()
                .replace(/^['"]|['"]$/g, "")

              if (pattern && !pattern.startsWith("!")) {
                patterns.push(normalizePath(pattern))
              }
            }

            return patterns
          }

          function walkDirs(rootDir, visitor) {
            for (const entry of fs.readdirSync(rootDir, { withFileTypes: true })) {
              if (!entry.isDirectory()) {
                continue
              }

              if ([".git", "node_modules", ".next", "dist"].includes(entry.name)) {
                continue
              }

              const absolutePath = path.join(rootDir, entry.name)
              visitor(absolutePath)
              walkDirs(absolutePath, visitor)
            }
          }

          function readPackageName(packageDir) {
            const packageFile = path.join(packageDir, "package.json")

            if (!fs.existsSync(packageFile)) {
              return null
            }

            try {
              return JSON.parse(fs.readFileSync(packageFile, "utf8")).name || null
            } catch (error) {
              console.log(`无法读取 ${packageFile}: ${error.message}`)
              return null
            }
          }

          function packageRequires(packageDir, packageName) {
            const packageFile = path.join(packageDir, "package.json")

            if (!fs.existsSync(packageFile)) {
              return false
            }

            const packageJson = JSON.parse(fs.readFileSync(packageFile, "utf8"))
            const dependencyBlocks = [
              packageJson.dependencies,
              packageJson.devDependencies,
              packageJson.peerDependencies,
              packageJson.optionalDependencies,
            ]

            return dependencyBlocks.some((dependencies) => dependencies && dependencies[packageName])
          }

          const patterns = readWorkspacePatterns()
          const patternMatchers = patterns.map((pattern) => globToRegExp(pattern))
          const packageDirs = [process.cwd()]
          const targetRequired = packageRequires(path.join(process.cwd(), "apps/web"), targetPackage)

          walkDirs(process.cwd(), (absolutePath) => {
            const relativePath = normalizePath(path.relative(process.cwd(), absolutePath))

            if (patternMatchers.some((matcher) => matcher.test(relativePath))) {
              packageDirs.push(absolutePath)
            }
          })

          const workspacePackages = packageDirs
            .map((packageDir) => ({
              dir: normalizePath(path.relative(process.cwd(), packageDir)) || ".",
              name: readPackageName(packageDir),
            }))
            .filter((item) => item.name)

          const foundPackage = workspacePackages.find((item) => item.name === targetPackage)
          const targetExistsOutsideWorkspace = []

          walkDirs(process.cwd(), (absolutePath) => {
            if (readPackageName(absolutePath) === targetPackage) {
              targetExistsOutsideWorkspace.push(normalizePath(path.relative(process.cwd(), absolutePath)))
            }
          })

          let sourceBuildable = "true"
          let needsWorkspacePatch = "false"
          let reason = `${targetPackage} is visible to the root pnpm workspace.`

          if (!targetRequired) {
            reason = `apps/web no longer depends on ${targetPackage}; workspace preflight passed.`
          } else if (!foundPackage) {
            if (targetExistsOutsideWorkspace.includes("design-oss/design-system")) {
              needsWorkspacePatch = "true"
              reason = `${targetPackage} exists at design-oss/design-system and will be added to pnpm-workspace.yaml only in the CI build workspace.`
            } else {
              sourceBuildable = "false"
              reason = targetExistsOutsideWorkspace.length > 0
                ? `${targetPackage} exists at ${targetExistsOutsideWorkspace.join(", ")}, but no supported CI workspace patch is configured.`
                : `${targetPackage} is required by apps/web but is not present in the root pnpm workspace.`
            }
          }

          console.log(`workspace packages: ${workspacePackages.map((item) => `${item.name} (${item.dir})`).join(", ") || "(none)"}`)
          console.log(`source_buildable=${sourceBuildable}`)
          console.log(`needs_workspace_patch=${needsWorkspacePatch}`)
          console.log(`reason=${reason}`)
          fs.appendFileSync(outputFile, `source_buildable=${sourceBuildable}\nneeds_workspace_patch=${needsWorkspacePatch}\nreason=${reason}\n`)
          NODE

  sync_code:
    name: 同步源 main 到 GitHub 与 CNB 目标 main
    runs-on: ubuntu-latest
    needs: [check, source_preflight]
    if: ${{ needs.check.outputs.canceled != 'true' && needs.source_preflight.outputs.source_buildable == 'true' }}

    steps:
      - name: 检出源仓库指定提交
        uses: actions/checkout@v5
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ needs.check.outputs.sha_full }}
          token: ${{ secrets.PAT }}
          fetch-depth: 0

      - name: 推送源提交到 GitHub 与 CNB 目标 main
        env:
          PAT: ${{ secrets.PAT }}
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
        run: |
          set -euo pipefail

          git remote add target "https://x-access-token:${PAT}@github.com/${TARGET_REPO}.git"
          git remote add cnb "https://cnb:${CNB_TOKEN}@${CNB_REPO_URL#https://}"

          # 只同步 main
          git push target +HEAD:refs/heads/${TARGET_BRANCH}
          git push cnb +HEAD:refs/heads/${TARGET_BRANCH}

  build_image:
    name: 构建并发布 Docker 镜像到 GHCR 与 CNB
    runs-on: ubuntu-latest
    needs: [check, source_preflight, sync_code]
    if: ${{ needs.check.outputs.canceled != 'true' && needs.source_preflight.outputs.source_buildable == 'true' }}

    steps:
      - name: 检出源仓库指定提交
        uses: actions/checkout@v5
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ needs.check.outputs.sha_full }}
          token: ${{ secrets.PAT }}
          fetch-depth: 1
          lfs: true
          submodules: recursive

      - name: 检出 LFS 对象（如果存在）
        run: git lfs checkout || true

      - name: 临时补齐 pnpm workspace
        if: ${{ needs.source_preflight.outputs.needs_workspace_patch == 'true' }}
        run: |
          set -euo pipefail

          workspace_path="design-oss/design-system"

          if [ ! -f "${workspace_path}/package.json" ]; then
            echo "缺少 ${workspace_path}/package.json，无法临时补齐 workspace。"
            exit 1
          fi

          if grep -Eq "['\"]?${workspace_path}['\"]?" pnpm-workspace.yaml; then
            echo "${workspace_path} 已在 pnpm-workspace.yaml 中。"
          else
            printf '\n  - "%s"\n' "${workspace_path}" >> pnpm-workspace.yaml
            echo "已在 CI 临时构建目录补齐 ${workspace_path}。"
          fi

          sed -n '1,80p' pnpm-workspace.yaml

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 登录 GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: Akuma-real
          password: ${{ secrets.PAT }}

      - name: 登录 CNB 制品库
        uses: docker/login-action@v4
        with:
          registry: docker.cnb.cool
          username: cnb
          password: ${{ secrets.CNB_TOKEN }}

      - name: 构建并推送镜像
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          build-args: |
            BASE_URL=${{ env.BASE_URL }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ env.TARGET_REPO }}
            org.opencontainers.image.revision=${{ needs.check.outputs.sha_full }}
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ needs.check.outputs.sha_short }}
            ${{ env.CNB_IMAGE }}:latest
            ${{ env.CNB_IMAGE }}:${{ needs.check.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  store:
    name: 记录构建产物提交版本
    runs-on: ubuntu-latest
    needs: [check, source_preflight, build_image]
    if: ${{ needs.check.outputs.canceled != 'true' && needs.source_preflight.outputs.source_buildable == 'true' }}

    steps:
      - name: 检出 SyncYohaku 仓库
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 将哈希写入文件
        run: echo "${{ needs.check.outputs.sha_full }}" > "${HASH_FILE}"

      - name: 提交文件
        run: |
          set -euo pipefail
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add "${HASH_FILE}"

          if git diff --cached --quiet; then
            echo "没有需要提交的变更。"
            exit 0
          fi

          git commit -m "更新哈希文件"
          git push
