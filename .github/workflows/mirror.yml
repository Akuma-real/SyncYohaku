name: 同步、构建并发布 Yohaku

on:
  workflow_dispatch:
  schedule:
    - cron: "7/5 * * * *"
  repository_dispatch:
    types: [trigger-workflow]

permissions:
  contents: write

concurrency:
  group: sync-build-yohaku-${{ github.ref }}
  cancel-in-progress: true

env:
  HASH_FILE: build_hash
  SOURCE_REPO: innei-dev/Yohaku
  TARGET_REPO: Akuma-real/Yohaku
  CNB_REPO: june-ink/yohaku
  CNB_REPO_URL: https://cnb.cool/june-ink/yohaku.git
  TARGET_BRANCH: main
  IMAGE_NAME: ghcr.io/akuma-real/yohaku
  CNB_IMAGE: docker.cnb.cool/june-ink/yohaku

jobs:
  prepare:
    name: 准备
    runs-on: ubuntu-latest
    outputs:
      hash_content: ${{ steps.read_hash.outputs.hash_content }}

    steps:
      - name: 检出 SyncYohaku 仓库
        uses: actions/checkout@v4

      - name: 读取 HASH_FILE 内容
        id: read_hash
        run: |
          content=$(cat "${HASH_FILE}" 2>/dev/null || true)
          echo "hash_content=$content" >> "$GITHUB_OUTPUT"

  check:
    name: 检查是否需要重新构建
    runs-on: ubuntu-latest
    needs: prepare
    outputs:
      canceled: ${{ steps.compare.outputs.canceled }}
      sha_short: ${{ steps.compare.outputs.sha_short }}
      sha_full: ${{ steps.compare.outputs.sha_full }}

    steps:
      - name: 检出源仓库
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ env.TARGET_BRANCH }}
          token: ${{ secrets.PAT }}
          fetch-depth: 1
          lfs: true

      - name: 检出 LFS 对象（如果存在）
        run: git lfs checkout || true

      - name: 比较源仓库哈希与已记录哈希
        id: compare
        env:
          FILE_HASH: ${{ needs.prepare.outputs.hash_content }}
        run: |
          sha_short=$(git rev-parse --short HEAD)
          sha_full=$(git rev-parse HEAD)

          echo "sha_short=$sha_short" >> "$GITHUB_OUTPUT"
          echo "sha_full=$sha_full" >> "$GITHUB_OUTPUT"

          echo "已记录哈希: ${FILE_HASH}"
          echo "当前哈希: ${sha_short}"

          if [ "${FILE_HASH}" = "${sha_short}" ]; then
            echo "上游没有变化，跳过。"
            echo "canceled=true" >> "$GITHUB_OUTPUT"
          else
            echo "检测到上游变化，继续执行。"
            echo "canceled=false" >> "$GITHUB_OUTPUT"
          fi

  sync_code:
    name: 同步源 main 到 GitHub 与 CNB 目标 main
    runs-on: ubuntu-latest
    needs: check
    if: ${{ needs.check.outputs.canceled != 'true' }}

    steps:
      - name: 检出源仓库指定提交
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ needs.check.outputs.sha_full }}
          token: ${{ secrets.PAT }}
          fetch-depth: 1

      - name: 推送源提交到 GitHub 与 CNB 目标 main
        env:
          PAT: ${{ secrets.PAT }}
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
        run: |
          set -euo pipefail

          git remote add target "https://x-access-token:${PAT}@github.com/${TARGET_REPO}.git"
          git remote add cnb "https://cnb:${CNB_TOKEN}@${CNB_REPO_URL#https://}"

          cleanup_remote_branches() {
            local remote_name="$1"
            local remote_label="$2"
            mapfile -t branches_to_delete < <(
              git ls-remote --heads "${remote_name}" \
                | awk '{sub("refs/heads/","",$2); print $2}' \
                | grep -v "^${TARGET_BRANCH}$" || true
            )

            if [ "${#branches_to_delete[@]}" -eq 0 ]; then
              echo "${remote_label} 没有需要删除的远程分支。"
              return
            fi

            for branch in "${branches_to_delete[@]}"; do
              [ -n "${branch}" ] || continue
              echo "正在删除 ${remote_label} 远程分支: ${branch}"
              git push "${remote_name}" --delete "${branch}"
            done
          }

          # 只同步 main
          git push target +HEAD:refs/heads/${TARGET_BRANCH}
          git push cnb +HEAD:refs/heads/${TARGET_BRANCH}

          cleanup_remote_branches target "GitHub"
          cleanup_remote_branches cnb "CNB"

  build_image:
    name: 构建并发布 Docker 镜像到 GHCR 与 CNB
    runs-on: ubuntu-latest
    needs: [check, sync_code]
    if: ${{ needs.check.outputs.canceled != 'true' }}

    steps:
      - name: 检出源仓库指定提交
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ needs.check.outputs.sha_full }}
          token: ${{ secrets.PAT }}
          fetch-depth: 1
          lfs: true

      - name: 检出 LFS 对象（如果存在）
        run: git lfs checkout || true

      - name: 登录 GHCR
        env:
          PAT: ${{ secrets.PAT }}
        run: |
          echo "${PAT}" | docker login ghcr.io -u Akuma-real --password-stdin

      - name: 登录 CNB 制品库
        env:
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
        run: |
          echo "${CNB_TOKEN}" | docker login docker.cnb.cool -u cnb --password-stdin

      - name: 构建镜像
        run: |
          docker build \
            --label org.opencontainers.image.source=https://github.com/${TARGET_REPO} \
            --label org.opencontainers.image.revision=${{ needs.check.outputs.sha_full }} \
            -t ${IMAGE_NAME}:latest \
            -t ${IMAGE_NAME}:${{ needs.check.outputs.sha_short }} \
            -t ${CNB_IMAGE}:latest \
            -t ${CNB_IMAGE}:${{ needs.check.outputs.sha_short }} \
            .

      - name: 推送镜像到 GHCR
        run: |
          docker push ${IMAGE_NAME}:latest
          docker push ${IMAGE_NAME}:${{ needs.check.outputs.sha_short }}

      - name: 推送镜像到 CNB 制品库
        run: |
          docker push ${CNB_IMAGE}:latest
          docker push ${CNB_IMAGE}:${{ needs.check.outputs.sha_short }}

  store:
    name: 记录构建产物提交版本
    runs-on: ubuntu-latest
    needs: [check, build_image]
    if: ${{ needs.check.outputs.canceled != 'true' }}

    steps:
      - name: 检出 SyncYohaku 仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 将哈希写入文件
        run: echo "${{ needs.check.outputs.sha_short }}" > "${HASH_FILE}"

      - name: 提交文件
        run: |
          set -euo pipefail
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add "${HASH_FILE}"

          if git diff --cached --quiet; then
            echo "没有需要提交的变更。"
            exit 0
          fi

          git commit -m "更新哈希文件"
          git push
