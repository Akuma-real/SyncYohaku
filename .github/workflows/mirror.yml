name: Sync Yohaku main only

on:
  workflow_dispatch:
  schedule:
    - cron: "7/5 * * * *"

jobs:
  sync-main:
    runs-on: ubuntu-latest

    steps:
      - name: Sync upstream main to target main and prune other branches
        env:
          PAT: ${{ secrets.PAT }}
          SOURCE_REPO: innei-dev/Yohaku
          TARGET_REPO: Akuma-real/Yohaku
        run: |
          set -euo pipefail

          SOURCE_URL="https://x-access-token:${PAT}@github.com/${SOURCE_REPO}.git"
          TARGET_URL="https://x-access-token:${PAT}@github.com/${TARGET_REPO}.git"

          rm -rf repo
          git clone \
            --single-branch \
            --branch main \
            "${SOURCE_URL}" \
            repo

          cd repo

          # 只强制同步 main -> main
          git push "${TARGET_URL}" +refs/heads/main:refs/heads/main

          # 删除目标仓库中除 main 外的所有远程分支
          git ls-remote --heads "${TARGET_URL}" \
            | awk '{sub("refs/heads/","",$2); print $2}' \
            | grep -v '^main$' \
            | while read -r branch; do
                [ -n "${branch}" ] || continue
                echo "Deleting remote branch: ${branch}"
                git push "${TARGET_URL}" --delete "${branch}"
              done
